name: Tag Docker Image

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  tag_docker_image:
    name: Tag Docker Image
    runs-on: Linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Retag multi-arch image
        env:
          IMAGE: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}
          TAGGED_IMAGE: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ github.ref_name }}
        run: |
          docker buildx imagetools create -t $TAGGED_IMAGE $IMAGE
          
