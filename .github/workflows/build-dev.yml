name: Docker Build

on:
  push:
    branches-ignore:
      - main
      - 'hotfix-*'

permissions:
  contents: read

jobs:
  build:
    name: Build Docker Image
    runs-on: Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
